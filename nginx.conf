server {
# Listen on port 80 for incoming HTTP traffic
listen 80;
listen [::]:80;

# Set the server name to your domain
server_name ...;

location / {
        # Forward requests to the application running on port 8080
        proxy_pass http://127.0.0.1:8000;

        # The following headers are added to the forwarded request to the backend server.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

}